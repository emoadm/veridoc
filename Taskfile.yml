# VeriDoc cross-language task runner (go-task) — the D-08 glue layer tying the
# uv (Python) and pnpm (JS/TS) workspaces together. NOT Nx/Turborepo.
#
# Targets every Phase-1 plan relies on:
#   task install          — uv sync + pnpm install
#   task lint             — ruff check + ruff format --check + pnpm -r lint
#   task test:unit        — uv run pytest + pnpm -r vitest run  (Wave 0 fast harness)
#   task test:integration — DB-backed pytest (needs Postgres; see VERIDOC_TEST_DATABASE_URL)
#   task test             — test:unit + test:integration
#   task build            — uv build + pnpm -r build
#
# The veridoc-audit DB-backed tests (tamper-detection, same-txn) resolve a Postgres via
# VERIDOC_TEST_DATABASE_URL, else an ephemeral testcontainers Postgres (needs Docker), else
# they SKIP — so `task test:unit` stays green from a clean clone with no DB/Docker present.
version: "3"

silent: true

tasks:
  install:
    desc: Install all workspace dependencies (uv sync + pnpm install).
    cmds:
      - uv sync --all-packages
      - pnpm install

  lint:
    desc: Lint Python (ruff) + JS/TS (pnpm -r lint). Exits 0 on the empty skeleton.
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .
      - pnpm -r --if-present lint

  "test:unit":
    desc: Fast unit tests — pytest + vitest. No cluster/containers required.
    cmds:
      - uv run pytest
      - pnpm -r --if-present vitest run

  "test:integration":
    desc: >-
      DB-backed integration tests: veridoc-audit (tamper-detection + same-txn) AND the
      reference-service end-to-end suite (D-07 walking skeleton — RBAC, login audit,
      field-encryption-at-rest, erasure x audit-immutability). Provide a Postgres via
      VERIDOC_TEST_DATABASE_URL (e.g. postgresql://user:pass@host:5432/db) or have Docker
      available for testcontainers; otherwise the DB tests skip.
    cmds:
      - uv run pytest libs/veridoc-audit/tests/test_tamper_detection.py libs/veridoc-audit/tests/test_same_txn.py
      - uv run pytest services/reference-service/tests/

  test:
    desc: Full test suite — fast unit tests + DB-backed integration tests.
    cmds:
      - task: "test:unit"
      - task: "test:integration"

  build:
    desc: Build all workspace artifacts (uv build + pnpm -r build).
    cmds:
      - uv build --all-packages
      - pnpm -r --if-present build

  "deploy:kind":
    desc: >-
      Prove the deploy path on a REAL ephemeral kind cluster (D-09, Success Criterion #1).
      Creates a kind cluster, builds the reference-service image, kind-loads it, creates the
      named K8s Secrets with EPHEMERAL values (NEVER committed — T-06-01), creates the
      Keycloak realm ConfigMap from the committed realm JSON (Pitfall 4), helm-installs the
      provider-portable chart (a REAL install, NOT --dry-run — Anti-Pattern avoided), and
      waits for Postgres + Keycloak + the reference service to become Ready. Reused by CI
      (.github/workflows/ci.yml) AND by local devs who have docker/kind/helm/kubectl.
      Requires: docker, kind, kubectl, helm on PATH (absent on the build host — runs in CI).
    vars:
      CLUSTER: '{{.CLUSTER | default "veridoc"}}'
      IMAGE: '{{.IMAGE | default "veridoc/reference-service:ci"}}'
      INGESTION_IMAGE: '{{.INGESTION_IMAGE | default "veridoc/ingestion-service:ci"}}'
      NAMESPACE: '{{.NAMESPACE | default "veridoc"}}'
      RELEASE: '{{.RELEASE | default "veridoc"}}'
    cmds:
      # 1. Ephemeral cluster.
      - kind create cluster --name "{{.CLUSTER}}" --wait 120s
      # 2. Build + load the reference-service image (Dockerfile from plan 01-05).
      - docker build -t "{{.IMAGE}}" -f services/reference-service/Dockerfile .
      - kind load docker-image "{{.IMAGE}}" --name "{{.CLUSTER}}"
      # 2b. Build + load the ingestion-service image (Dockerfile from plan 02-06).
      - docker build -t "{{.INGESTION_IMAGE}}" -f services/ingestion-service/Dockerfile .
      - kind load docker-image "{{.INGESTION_IMAGE}}" --name "{{.CLUSTER}}"
      - kubectl create namespace "{{.NAMESPACE}}" --dry-run=client -o yaml | kubectl apply -f -
      # 3. Ephemeral secrets (throwaway, cluster-local — NEVER in git, T-06-01).
      - >-
        kubectl -n "{{.NAMESPACE}}" create secret generic veridoc-postgres
        --from-literal=POSTGRES_USER=veridoc
        --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 24)"
        --from-literal=POSTGRES_DB=veridoc
        --dry-run=client -o yaml | kubectl apply -f -
      - >-
        kubectl -n "{{.NAMESPACE}}" create secret generic veridoc-redis
        --from-literal=REDIS_PASSWORD="$(openssl rand -hex 24)"
        --dry-run=client -o yaml | kubectl apply -f -
      - >-
        kubectl -n "{{.NAMESPACE}}" create secret generic veridoc-keycloak
        --from-literal=KEYCLOAK_ADMIN=admin
        --from-literal=KEYCLOAK_ADMIN_PASSWORD="$(openssl rand -hex 24)"
        --from-literal=REFERENCE_SERVICE_CLIENT_SECRET="$(openssl rand -hex 32)"
        --dry-run=client -o yaml | kubectl apply -f -
      - >-
        kubectl -n "{{.NAMESPACE}}" create secret generic veridoc-kms
        --from-literal=VERIDOC_MASTER_KEY="$(openssl rand -hex 32)"
        --dry-run=client -o yaml | kubectl apply -f -
      # MongoDB + MinIO secrets (ephemeral throwaway — never committed, T-06-01).
      - >-
        kubectl -n "{{.NAMESPACE}}" create secret generic veridoc-mongodb
        --from-literal=MONGO_INITDB_ROOT_USERNAME=veridoc
        --from-literal=MONGO_INITDB_ROOT_PASSWORD="$(openssl rand -hex 24)"
        --dry-run=client -o yaml | kubectl apply -f -
      - >-
        kubectl -n "{{.NAMESPACE}}" create secret generic veridoc-minio
        --from-literal=MINIO_ROOT_USER=veridoc
        --from-literal=MINIO_ROOT_PASSWORD="$(openssl rand -hex 24)"
        --dry-run=client -o yaml | kubectl apply -f -
      # 4. Realm-as-code ConfigMap from the committed realm JSON (Pitfall 4).
      - >-
        kubectl -n "{{.NAMESPACE}}" create configmap veridoc-keycloak-realm
        --from-file=veridoc-realm.json=deploy/keycloak/veridoc-realm.json
        --dry-run=client -o yaml | kubectl apply -f -
      # 5. REAL helm install (NOT --dry-run) — the deploy path is genuinely proven.
      - >-
        helm upgrade --install "{{.RELEASE}}" deploy/helm/veridoc
        --namespace "{{.NAMESPACE}}"
        --set referenceService.image.repository="$(echo {{.IMAGE}} | cut -d: -f1)"
        --set referenceService.image.tag="$(echo {{.IMAGE}} | cut -d: -f2)"
        --set ingestionService.image.repository="$(echo {{.INGESTION_IMAGE}} | cut -d: -f1)"
        --set ingestionService.image.tag="$(echo {{.INGESTION_IMAGE}} | cut -d: -f2)"
        --wait --timeout 10m
      # 6. Wait for readiness (the kubectl-wait gate).
      - kubectl -n "{{.NAMESPACE}}" wait --for=condition=available --timeout=300s deployment/veridoc-postgres
      - kubectl -n "{{.NAMESPACE}}" wait --for=condition=available --timeout=420s deployment/veridoc-keycloak
      - kubectl -n "{{.NAMESPACE}}" wait --for=condition=available --timeout=300s deployment/veridoc-reference-service
      - kubectl -n "{{.NAMESPACE}}" wait --for=condition=available --timeout=300s deployment/veridoc-mongodb
      - kubectl -n "{{.NAMESPACE}}" wait --for=condition=available --timeout=300s deployment/veridoc-minio
      - kubectl -n "{{.NAMESPACE}}" wait --for=condition=available --timeout=300s deployment/veridoc-ingestion-service
      - kubectl -n "{{.NAMESPACE}}" wait --for=condition=available --timeout=300s deployment/veridoc-ingestion-worker

  "deploy:kind:down":
    desc: Tear down the ephemeral kind cluster created by deploy:kind.
    vars:
      CLUSTER: '{{.CLUSTER | default "veridoc"}}'
    cmds:
      - kind delete cluster --name "{{.CLUSTER}}"
