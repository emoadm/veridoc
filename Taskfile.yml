# VeriDoc cross-language task runner (go-task) — the D-08 glue layer tying the
# uv (Python) and pnpm (JS/TS) workspaces together. NOT Nx/Turborepo.
#
# Targets every Phase-1 plan relies on:
#   task install          — uv sync + pnpm install
#   task lint             — ruff check + ruff format --check + pnpm -r lint
#   task test:unit        — uv run pytest + pnpm -r vitest run  (Wave 0 fast harness)
#   task test:integration — DB-backed pytest (needs Postgres; see VERIDOC_TEST_DATABASE_URL)
#   task test             — test:unit + test:integration
#   task build            — uv build + pnpm -r build
#
# The veridoc-audit DB-backed tests (tamper-detection, same-txn) resolve a Postgres via
# VERIDOC_TEST_DATABASE_URL, else an ephemeral testcontainers Postgres (needs Docker), else
# they SKIP — so `task test:unit` stays green from a clean clone with no DB/Docker present.
version: "3"

silent: true

tasks:
  install:
    desc: Install all workspace dependencies (uv sync + pnpm install).
    cmds:
      - uv sync --all-packages
      - pnpm install

  lint:
    desc: Lint Python (ruff) + JS/TS (pnpm -r lint). Exits 0 on the empty skeleton.
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .
      - pnpm -r --if-present lint

  "test:unit":
    desc: Fast unit tests — pytest + vitest. No cluster/containers required.
    cmds:
      - uv run pytest
      - pnpm -r --if-present vitest run

  "test:integration":
    desc: >-
      DB-backed integration tests: veridoc-audit (tamper-detection + same-txn) AND the
      reference-service end-to-end suite (D-07 walking skeleton — RBAC, login audit,
      field-encryption-at-rest, erasure x audit-immutability). Provide a Postgres via
      VERIDOC_TEST_DATABASE_URL (e.g. postgresql://user:pass@host:5432/db) or have Docker
      available for testcontainers; otherwise the DB tests skip.
    cmds:
      - uv run pytest libs/veridoc-audit/tests/test_tamper_detection.py libs/veridoc-audit/tests/test_same_txn.py
      - uv run pytest services/reference-service/tests/

  test:
    desc: Full test suite — fast unit tests + DB-backed integration tests.
    cmds:
      - task: "test:unit"
      - task: "test:integration"

  build:
    desc: Build all workspace artifacts (uv build + pnpm -r build).
    cmds:
      - uv build --all-packages
      - pnpm -r --if-present build
