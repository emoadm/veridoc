{{- if .Values.minio.enabled }}
{{- $component := "minio" }}
{{- $name := include "veridoc.componentName" (dict "component" $component) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "veridoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ .Values.minio.replicas }}
  selector:
    matchLabels:
      {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "veridoc.labels" . | nindent 8 }}
        {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # MinIO server with console on :9001 (T-02-INFRA-03: image tag pinned to RELEASE.* above).
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          env:
            # Credentials come from the named Secret — NEVER inlined (T-06-01, T-02-INFRA-02).
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.minio.name }}
                  key: {{ .Values.secrets.minio.usernameKey }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.minio.name }}
                  key: {{ .Values.secrets.minio.passwordKey }}
          ports:
            - name: minio-api
              containerPort: {{ .Values.minio.port }}
            - name: minio-console
              containerPort: {{ .Values.minio.consolePort }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "mc alias set local http://localhost:9000 \"$MINIO_ROOT_USER\" \"$MINIO_ROOT_PASSWORD\" && mc admin info local"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: minio-api
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.minio.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "veridoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  selector:
    {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 4 }}
  ports:
    - name: minio-api
      port: {{ .Values.minio.port }}
      targetPort: minio-api
    - name: minio-console
      port: {{ .Values.minio.consolePort }}
      targetPort: minio-console
{{- end }}
