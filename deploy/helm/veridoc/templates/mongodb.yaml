{{- if .Values.mongodb.enabled }}
{{- $component := "mongodb" }}
{{- $name := include "veridoc.componentName" (dict "component" $component) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "veridoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ .Values.mongodb.replicas }}
  selector:
    matchLabels:
      {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "veridoc.labels" . | nindent 8 }}
        {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: mongodb
              containerPort: {{ .Values.mongodb.port }}
          env:
            # Credentials come from the named Secret — NEVER inlined (T-06-01, T-02-INFRA-01).
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.mongodb.name }}
                  key: {{ .Values.secrets.mongodb.usernameKey }}
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.mongodb.name }}
                  key: {{ .Values.secrets.mongodb.passwordKey }}
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.mongodb.database | quote }}
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          {{- if .Values.mongodb.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "veridoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  selector:
    {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 4 }}
  ports:
    - name: mongodb
      port: {{ .Values.mongodb.port }}
      targetPort: mongodb
{{- end }}
