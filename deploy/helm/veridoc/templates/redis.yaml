{{- if .Values.redis.enabled }}
{{- $component := "redis" }}
{{- $name := include "veridoc.componentName" (dict "component" $component) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "veridoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ .Values.redis.replicas }}
  selector:
    matchLabels:
      {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "veridoc.labels" . | nindent 8 }}
        {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # Require auth via the named Secret (T-06-01) — password from REDIS_PASSWORD.
          command: ["sh", "-c", "exec redis-server --requirepass \"$REDIS_PASSWORD\""]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.name }}
                  key: {{ .Values.secrets.redis.passwordKey }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.port }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "veridoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  selector:
    {{- include "veridoc.selectorLabels" (dict "component" $name "root" .) | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: redis
{{- end }}
