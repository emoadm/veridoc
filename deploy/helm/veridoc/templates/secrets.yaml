{{/*
Secret CONTRACT documentation — NOT secret material.

This template intentionally creates NO Secret objects with values. The platform's
secrets are delivered out of band (CI: `kubectl create secret`; prod: sealed-secrets /
external-secrets / cloud KMS) and referenced BY NAME from the workload templates
(envFrom: secretRef / valueFrom: secretKeyRef). Committing plaintext secret values to
the chart is forbidden (T-06-01) and gated by a grep check in CI.

Rendering this template emits only a ConfigMap that DESCRIBES the required Secret names
and keys (a deploy-time checklist), so `helm template` documents the contract without
ever embedding a credential. The authoritative enumeration lives in
docs/validation/SECRETS-CONTRACT.md.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "veridoc.fullname" . }}-secret-contract
  labels:
    {{- include "veridoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-contract
data:
  README: |
    VeriDoc required Kubernetes Secrets (referenced by name; NO values in git — T-06-01).
    Create these BEFORE `helm install`. See docs/validation/SECRETS-CONTRACT.md.

    Secret "{{ .Values.secrets.postgres.name }}":
      {{ .Values.secrets.postgres.usernameKey }}   # Postgres app username
      {{ .Values.secrets.postgres.passwordKey }}   # Postgres app password
      {{ .Values.secrets.postgres.databaseKey }}   # Postgres database name

    Secret "{{ .Values.secrets.redis.name }}":
      {{ .Values.secrets.redis.passwordKey }}       # Redis password (session store)

    Secret "{{ .Values.secrets.keycloak.name }}":
      {{ .Values.secrets.keycloak.adminUserKey }}            # Keycloak bootstrap admin user
      {{ .Values.secrets.keycloak.adminPasswordKey }}        # Keycloak bootstrap admin password
      {{ .Values.secrets.keycloak.clientSecretKey }}         # reference-service OIDC client secret (realm ${REFERENCE_SERVICE_CLIENT_SECRET})

    Secret "{{ .Values.secrets.kms.name }}":
      {{ .Values.secrets.kms.masterKeyKey }}        # per-patient master key ref (wrapped by cloud KMS in prod)
